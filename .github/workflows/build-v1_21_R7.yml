name: Build bukkit/v1_21_R5 (MC 1.21.8)

on:
  push:
    branches:
      - master
    paths:
      - "bukkit/v1_21_R5/**"
      - "bukkit/src/**"
      - "shared/**"
      - "api/**"
      - "build-logic/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/build-v1_21_R5.yml"
  pull_request:
    paths:
      - "bukkit/v1_21_R5/**"
  workflow_dispatch:

jobs:
  build:
    name: Build v1_21_R5 (MC 1.21.8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 25

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build :bukkit:v1_21_R5
        run: ./gradlew :bukkit:v1_21_R5:build --no-daemon

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAB-bukkit-v1_21_R5-${{ github.run_number }}
          path: bukkit/v1_21_R5/build/libs/*.jar
          if-no-files-found: error
